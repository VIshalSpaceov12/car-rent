name: CI
on:
  push:
    branches: [main]
  pull_request: {}

jobs:
  quality:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: car_rental_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/car_rental_test
      JWT_SECRET: ci-jwt-secret-at-least-16-chars
      SESSION_SECRET: ci-session-secret-at-least-16

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Generate the Prisma client first (required before typecheck / tests)
      - run: npx prisma generate --schema apps/web/prisma/schema.prisma

      # Apply committed migrations (never use migrate dev in CI)
      - run: npx prisma migrate deploy --schema apps/web/prisma/schema.prisma

      - run: npm run db:seed -w @car-rental/web

      - run: npm run typecheck

      # Lint: ~38 warnings on intentional hex in tokens/seed source are expected; no errors.
      # Do NOT add --max-warnings 0.
      - run: npm run lint

      - run: npm run test
